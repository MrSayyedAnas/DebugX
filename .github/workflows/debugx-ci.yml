name: DebugX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        id: tests
        run: npm test
        continue-on-error: true

      - name: Notify DebugX (Success)
        if: steps.tests.outcome == 'success'
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BUG_ID=$(echo "$COMMIT_MSG" | grep -oP '(?<=#)[a-f0-9]{24}' || true)
          if [ -n "$BUG_ID" ]; then
            curl -X POST ${{ secrets.DEBUGX_API_URL }}/api/v1/ci/webhook \
              -H "Content-Type: application/json" \
              -d '{
                "bugId": "'"$BUG_ID"'",
                "status": "success",
                "commit": "${{ github.sha }}",
                "branch": "${{ github.ref_name }}",
                "triggeredBy": "${{ github.actor }}"
              }' || true
            echo "✅ DebugX notified: Bug $BUG_ID resolved"
          else
            echo "ℹ️ No bug ID found in commit message. Skipping."
          fi

      - name: Notify DebugX (Failure)
        if: steps.tests.outcome == 'failure'
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BUG_ID=$(echo "$COMMIT_MSG" | grep -oP '(?<=#)[a-f0-9]{24}' || true)
          if [ -n "$BUG_ID" ]; then
            curl -X POST ${{ secrets.DEBUGX_API_URL }}/api/v1/ci/webhook \
              -H "Content-Type: application/json" \
              -d '{
                "bugId": "'"$BUG_ID"'",
                "status": "failure",
                "commit": "${{ github.sha }}",
                "branch": "${{ github.ref_name }}",
                "triggeredBy": "${{ github.actor }}"
              }' || true
            echo "❌ DebugX notified: Bug $BUG_ID build failed"
          else
            echo "ℹ️ No bug ID found in commit message. Skipping."
          fi